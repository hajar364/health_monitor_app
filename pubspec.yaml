name: health_monitor_app
description: A Flutter application for IoT Health Monitoring

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # HTTP communication with ESP32
  http: ^1.2.0

  # Date formatting for timestamps
  intl: ^0.18.1

  # Audio for alerts
  audioplayers: ^6.6.0

  # Bluetooth (for legacy version)
  flutter_bluetooth_serial: ^0.4.0


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0


flutter:
  uses-material-design: true