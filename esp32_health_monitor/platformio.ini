[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
monitor_port = COM3

; ========== COMPILATEUR ==========
build_flags = 
  -D CORE_DEBUG_LEVEL=0
  -Wall
  -Wextra

; ========== DÉPENDANCES ==========
lib_deps =
  Wire
  WiFi
  WebServer
  adafruit/Adafruit MLX90614 Library @ ^2.1.1
  ElectroMech/MPU6050 @ ^1.0.4
  bblanchon/ArduinoJson @ ^7.0.3
  
; Alternative: Uncomment pour utiliser les libs depuis GitHub
; https://github.com/adafruit/Adafruit-MLX90614-Library
; https://github.com/ElectroMech/MPU6050

; ========== UPLOAD ==========
upload_speed = 921600
upload_port = COM3

; ========== MONITEUR SÉRIE ==========
; Affiche les logs en temps réel: pio device monitor
monitor_filters = 
  time
  default
  send_on_enter

; ========== OPTIONS DE BUILD ==========
extra_scripts =

; ========== POUR DEVELOPEMENT ==========
[env:esp32dev-debug]
extends = esp32dev
build_flags = 
  -D CORE_DEBUG_LEVEL=5
  -Wall
  -Wextra
monitor_speed = 115200